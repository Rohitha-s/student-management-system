<button onclick="getStudents()">
Get Students
</button>

<script>
async function getStudents() {
    let token = localStorage.getItem("token");
    let response = await fetch(
        "http://127.0.0.1:5000/api/students",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );
    let data = await response.json();

    console.log(data);
}
</script>
