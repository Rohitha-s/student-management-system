<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4 py-12">

<div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl px-8 py-10 shadow-2xl">

    <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-white tracking-tight">
            Edit User
        </h1>

        <p class="mt-2 text-sm text-gray-400">
            Update user information
        </p>
    </div>

    <form method="POST" class="space-y-5">

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">
                Username
            </label>

            <input
                type="text"
                name="username"
                value="{{ user.username }}"
                required
                class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100
                       transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">
                Email
            </label>

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                required
                class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100
                       transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">
                Phone Number
            </label>

            <input
                type="text"
                name="phone_number"
                value="{{ user.phone_number }}"
                maxlength="10"
                minlength="10"
                pattern="[0-9]{10}"
                title="Phone number must contain exactly 10 digits"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                required
                class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100
                       transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">
                Role
            </label>

            <select
                name="role"
                class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100
                       transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">

                <option value="student"
                {% if user.role=="student" %}selected{% endif %}>
                    Student
                </option>

                <option value="admin"
                {% if user.role=="admin" %}selected{% endif %}>
                    Admin
                </option>

            </select>
        </div>

        <button
            type="submit"
            class="mt-2 w-full rounded-lg bg-blue-600 px-6 py-3 text-sm font-semibold text-white
                   transition duration-200 hover:bg-blue-500 active:scale-[0.98] shadow-lg">

            Update User

        </button>

    </form>

    <p class="mt-6 text-center text-xs text-gray-500">

        <a href="/home"
           class="font-semibold text-blue-400 hover:text-blue-300 transition-colors duration-150">

            ← Back Home

        </a>

    </p>

</div>

</body>
</html>
