<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl px-8 py-10 shadow-2xl">

    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white tracking-tight">Create Account</h1>
      <p class="mt-2 text-sm text-gray-400">Register to access the portal</p>
    </div>

    <form method="POST" class="space-y-5">

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">Username</label>
        <input
          type="text"
          name="username"
          required
          placeholder="e.g. john_doe"
          class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100 placeholder-gray-600
                 transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">Email</label>
        <input
          type="email"
          name="email"
          required
          placeholder="you@example.com"
          class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100 placeholder-gray-600
                 transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        />
        {% if error %}
          <p class="mt-2 text-sm text-red-400 font-medium">
          {{ error }}</p>
        {% endif %} 
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">Password</label>
        <input
          type="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100 placeholder-gray-600
                 transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">Role</label>
        <select
          name="role"
          class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-sm text-gray-100
                 transition duration-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer"
        >
          <option value="student">Student</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button
        type="submit"
        class="mt-2 w-full rounded-lg bg-blue-600 px-6 py-3 text-sm font-semibold text-white
               transition duration-200 hover:bg-blue-500 active:scale-[0.98] shadow-lg"
      >
        Create Account
      </button>

    </form>

    <p class="mt-6 text-center text-xs text-gray-500">
      Already have an account?
      <a href="/" class="font-semibold text-blue-400 hover:text-blue-300 transition-colors duration-150">
        Back to Login
      </a>
    </p>

  </div>

</body>
</html>
